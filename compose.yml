services:
  frontend:
    build:
      context: .
      dockerfile: ./dev.Dockerfile
    # Runs on its OWN network (the default compose bridge) — deliberately NOT
    # joined to the backend stack's network. The Next SERVER (RSC render, route
    # handlers, /iiif-proxy rewrites) reaches the backend through the host's
    # published ports via host.docker.internal (INTERNAL_* below). The BROWSER
    # keeps the public localhost URLs from .env. The backend already allows the
    # host.docker.internal Host header (api/config/.env ALLOWED_HOSTS).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      INTERNAL_API_URL: http://host.docker.internal:8000
      INTERNAL_IIIF_UPSTREAM: http://host.docker.internal:1024
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
