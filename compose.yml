services:
  frontend:
    build:
      context: .
      dockerfile: ./dev.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_IIIF_UPSTREAM: ${NEXT_PUBLIC_IIIF_UPSTREAM}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_IIIF_UPSTREAM: ${NEXT_PUBLIC_IIIF_UPSTREAM}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    ports:
      - '${FRONT_END_PORT}:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
