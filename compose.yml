# Containerized local dev — run the frontend without a host Node toolchain:
# just `docker compose up` (or `just up`). Staging/production run from the
# infrastructure repo using images built from Dockerfile; this file never
# deploys anything.
services:
  frontend:
    build:
      context: .
      dockerfile: dev.Dockerfile
    # Container-topology env, set here so `docker compose up` works with any
    # (or no) .env — process env beats .env files in Next. Browser-facing
    # URLs stay on localhost (the backend ports are published on the host);
    # only in-container server-side fetches use host.docker.internal:
    # INTERNAL_API_URL for SSR/route handlers, and the IIIF upstream, which
    # is consumed exclusively by the server-side /iiif-proxy rewrite.
    # Values beyond these still come from .env if present.
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://host.docker.internal:8000
      NEXT_PUBLIC_IIIF_UPSTREAM: http://host.docker.internal:8182
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - '3000:3000'
    extra_hosts:
      # On Linux engines this maps host.docker.internal to the host so the
      # dev server's SSR fetches reach the backend stack on :8000/:8182.
      # Docker Desktop (macOS/Windows) provides the name natively.
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      # Named volume so `docker compose run` one-offs — the just recipes for
      # lint/test/build — reuse the same deps instead of re-seeding a throwaway
      # copy per run. Seeded from the image on first use; `just install`
      # refreshes it after lockfile changes.
      - node_modules:/app/node_modules
      # .next stays per-container (anonymous): Next 16 keeps a dev-server lock
      # in .next/dev, and sharing it across containers deadlocks on stale locks.
      - /app/.next

volumes:
  node_modules:
