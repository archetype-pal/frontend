# Containerized local dev: `just up` (or `docker compose up`). No host Node
# toolchain or .env needed — the environment below carries the container
# topology. Staging/production run from the infrastructure repo; this file
# never deploys anything.
services:
  frontend:
    build:
      context: .
      dockerfile: dev.Dockerfile
    environment:
      # Browser-facing URLs stay on localhost (the backend publishes its
      # ports on the host); only in-container server-side fetches use
      # host.docker.internal (INTERNAL_API_URL and the /iiif-proxy upstream).
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://host.docker.internal:8000
      NEXT_PUBLIC_IIIF_UPSTREAM: http://host.docker.internal:8182
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - '3000:3000'
    extra_hosts:
      # Linux engines; Docker Desktop (macOS/Windows) provides this natively.
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      # Shared deps volume, refreshed via `just install`. .next stays
      # per-container: Next keeps a dev-server lock in .next/dev that
      # deadlocks when shared.
      - node_modules:/app/node_modules
      - /app/.next

volumes:
  node_modules:
