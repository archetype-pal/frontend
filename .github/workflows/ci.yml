name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: pnpm run format

  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://archetype.gla.ac.uk
      NEXT_PUBLIC_IIIF_UPSTREAM: https://archetype.gla.ac.uk
      NEXT_PUBLIC_SITE_URL: https://archetype.gla.ac.uk
      CORS_ALLOWED_ORIGINS: https://archetype.gla.ac
      MEILI_MASTER_KEY: k-CFiSgz7lyXHPSTw_rhyTw0AKgNV7_y78k0NQR2fx4
      MEILISEARCH_API_KEY: k-CFiSgz7lyXHPSTw_rhyTw0AKgNV7_y78k0NQR2fx4
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check bundle budget
        run: pnpm bundle-budget

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    env:
      NEXT_PUBLIC_API_URL: https://archetype.gla.ac.uk
      NEXT_PUBLIC_IIIF_UPSTREAM: https://archetype.gla.ac.uk
      NEXT_PUBLIC_SITE_URL: https://archetype.gla.ac.uk
      CORS_ALLOWED_ORIGINS: https://archetype.gla.ac
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lhci
